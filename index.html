const START_STEP = 'start';
const TOTAL_STEPS = 16;

/* ═══════════════ STATE ═══════════════ */
const rawQuery = location.search.slice(1);
const urlParams = new URLSearchParams(location.search);
const hasLegacyParams = /(?:^|&)(?:p|n|c)=/.test(rawQuery);
const queryToken = !hasLegacyParams && /^[A-Za-z0-9_-]{10,16}$/.test(rawQuery) ? rawQuery : '';
const state = {
  phone: normalizePhone(urlParams.get('p') || ''),
  name: (urlParams.get('n') || '').trim(),
  campaign: (urlParams.get('c') || '').trim(),
  shortToken: queryToken,
  tokenResolved: false,
  optedOut: false,
  fields: {},
  path: [],
  answers: [],   // [{stepId, answer}] — the source of truth for resume
  stepCount: 0,
  done: false,
};

function normalizePhone(raw) {
  let d = String(raw || '').replace(/\D/g, '');
  if (d.startsWith('0')) d = '972' + d.slice(1);
  return /^9725\d{8}$/.test(d) ? d : '';
}

/* ═══════════════ SUPABASE RPC ═══════════════ */
async function rpc(fn, payload) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error(`${fn} failed: ${res.status}`);
  return res.status === 204 ? null : res.json();
}

async function resolveShortToken() {
  if (!state.shortToken) return false;
  const result = await rpc('resolve_sms_short_link', {
    p_token: state.shortToken,
    p_user_agent: navigator.userAgent,
  });
  const phone = normalizePhone(result?.phone || '');
  if (!result?.ok || !phone) throw new Error('invalid_short_link');
  state.phone = phone;
  state.name = String(result.name || '').trim();
  state.campaign = String(result.campaign || '').trim();
  state.optedOut = !!result.optedOut;
  state.tokenResolved = true;
  return true;
}

function logClick() {
  if (state.tokenResolved) return; // resolve_sms_short_link already logged this page load
  rpc('log_web_click', {
    p_phone: state.phone,
    p_name: state.name || null,
    p_campaign: state.campaign || null,
    p_user_agent: navigator.userAgent,
  }).catch(() => {}); // fire-and-forget, never block the UX
}

async function handleOptOut() {
  inputbar.classList.remove('show');
  optionsBox.classList.remove('show');
  try {
    const result = state.shortToken
      ? await rpc('opt_out_sms', {
          p_token: state.shortToken,
          p_user_agent: navigator.userAgent,
        })
      : await rpc('opt_out_sms_by_phone', {
          p_phone: state.phone,
          p_user_agent: navigator.userAgent,
        });
    if (!result?.ok) throw new Error(result?.reason || 'opt_out_failed');
    state.optedOut = true;
    state.done = true;
    clearTimeout(partialTimer);
    progress.style.width = '100%';
    saveState();
    addBubble('המספר הוסר בהצלחה מרשימת התפוצה. לא יישלחו אליו הודעות נוספות.', 'bot');
  } catch (_) {
    addBubble('לא הצלחנו להשלים את ההסרה כרגע. אפשר לנסות שוב בעוד רגע.', 'bot');
    renderOptions(FLOW[START_STEP]);
  }
}

    p_phone: state.phone,
    p_name: state.fields.name || state.name || null,
    p_fields: state.fields,
    p_flow_path: state.path,
    p_completed: true,
  };
  try { await rpc('submit_web_lead', payload); }
  catch (e) { // one retry, then give up silently (user already sees thanks)
    try { await rpc('submit_web_lead', payload); } catch (_) {}
  }
}

/* ═══════════════ PERSISTENCE (refresh-resume) ═══════════════ */
const LS_KEY = 'nahman_funnel_v4'; // v4: Orel flow + short tokens + persistent opt-out
const LS_TTL = 24 * 60 * 60 * 1000; // resume window: 24h, matches server-side dedup

function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      phone: state.phone,
      name: state.name,
      campaign: state.campaign,
      shortToken: state.shortToken,
      optedOut: state.optedOut,
      answers: state.answers,
      currentStepId,
      done: state.done,
      ts: Date.now(),
    }));
  } catch (_) {}
  savePartial();
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s.ts || Date.now() - s.ts > LS_TTL) { localStorage.removeItem(LS_KEY); return null; }
    return s;
  } catch (_) { return null; }
}

function clearState() { try { localStorage.removeItem(LS_KEY); } catch (_) {} }

// Debounced partial save to the server: even a mid-flow quitter becomes a
// "partial" lead (24h upsert keeps it one row; dashboard shows "חלקי").
let partialTimer = null;
function savePartial() {
  if (!state.phone || state.done) return;
  clearTimeout(partialTimer);
  partialTimer = setTimeout(() => {
    if (state.done) return; // completed submit already fired — never overwrite with partial
    rpc('submit_web_lead', {
      p_phone: state.phone,
      p_name: state.fields.name || state.name || null,
      p_fields: state.fields,
      p_flow_path: state.path,
      p_completed: false,
    }).catch(() => {});
  }, 800);
}

// Rebuild fields/path + instantly re-render the whole chat history from FLOW.
function restoreSession(saved) {
  state.phone = state.phone || saved.phone || '';
  state.name = state.name || saved.name || '';
  state.campaign = state.campaign || saved.campaign || '';
  state.shortToken = state.shortToken || saved.shortToken || '';
  state.optedOut = !!saved.optedOut;
  state.answers = Array.isArray(saved.answers) ? saved.answers : [];
  state.done = !!saved.done;
  for (const a of state.answers) {
    const st = FLOW[a.stepId];
    if (!st) continue;
    addBubble(st.title || st.messageText || '', 'bot', st.description || null);
    addBubble(a.answer, 'user');
    if (st.field) state.fields[st.field] = a.answer;
    state.path.push(a.stepId);
  }
  state.stepCount = state.answers.length;
  setProgress();
}

/* ═══════════════ UI ═══════════════ */
const chat = document.getElementById('chat');
const optionsBox = document.getElementById('options');
const inputbar = document.getElementById('inputbar');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const progress = document.getElementById('progress');

function nowTime() {
  return new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
}
function scrollDown() { chat.scrollTop = chat.scrollHeight; }

function addBubble(text, who, desc) {
  const b = document.createElement('div');
  b.className = `bubble ${who}`;
  b.textContent = text;
  if (desc) {
    const d = document.createElement('span');
    d.className = 'desc'; d.textContent = desc;
    b.appendChild(d);
  }
  const t = document.createElement('span');
  t.className = 'time'; t.textContent = nowTime();
  b.appendChild(t);
  chat.appendChild(b);
  scrollDown();
}

function showTyping(cb, delay = 650) {
  const b = document.createElement('div');
  b.className = 'bubble bot';
  b.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
  chat.appendChild(b);
  scrollDown();
  setTimeout(() => { b.remove(); cb(); }, delay);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setProgress() {
  progress.style.width = Math.min(100, Math.round(state.stepCount / TOTAL_STEPS * 100)) + '%';
}

/* ═══════════════ FLOW ENGINE ═══════════════ */
function renderStep(stepId) {
  const step = FLOW[stepId];
  if (!step) return;
  state.stepCount++;
  setProgress();

  const text = step.title || step.messageText || '';
  showTyping(() => {
    addBubble(text, 'bot', step.description || null);
    if (step.isComplete) {
      finishFlow(stepId);
    } else if (step.type === 'list') {
      renderOptions(step);
    } else {
      renderTextInput(step);
    }
  });
}

function renderOptions(step) {
  optionsBox.innerHTML = '';
  step.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.text;
    btn.onclick = async () => {
      optionsBox.querySelectorAll('button').forEach(b => b.disabled = true);
      addBubble(opt.text, 'user');
      optionsBox.classList.remove('show');
      if (opt.action === 'opt_out') {
        await handleOptOut();
        return;
      }
      if (step.field) state.fields[step.field] = opt.text;
      state.answers.push({ stepId: currentStepId, answer: opt.text });
      state.path.push(currentStepId);
      const next = opt.next || step.next;
      currentStepId = next;
      saveState();
      setTimeout(() => renderStep(next), 350);
    };
    optionsBox.appendChild(btn);
  });
  optionsBox.classList.add('show');
  setChatInput(); // free-text bar stays available alongside the options (like the WA bot)
  scrollDown();
}

/* ── Free-text chat bar (client request 20.7): an arbitrary message during a
   list question re-asks the SAME question with its options (no advance); the
   message itself is logged to the lead's remarks on the server. A message
   after completion restarts the flow from the first question. ── */
function setChatInput() {
  inputbar.classList.add('show');
  textInput.type = 'text';
  textInput.placeholder = 'הקלד הודעה...';
  const submit = () => {
    const val = textInput.value.trim();
    if (!val) return;
    textInput.value = '';
    addBubble(val, 'user');
    sendRemark(val);
    if (state.done) { restartFlow(); return; }
    const st = FLOW[currentStepId];
    if (st && st.type === 'list') {
      setTimeout(() => {
        addBubble(st.title || '', 'bot', st.description || null);
        renderOptions(st);
      }, 400);
    }
  };
  sendBtn.onclick = submit;
  textInput.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
}

function sendRemark(text) {
  if (!state.phone) return;
  rpc('submit_web_lead', {
    p_phone: state.phone,
    p_name: state.fields.name || state.name || null,
    p_fields: { remarks: text },
    p_flow_path: state.path,
    p_completed: false,
  }).catch(() => {});
}

function restartFlow() {
  state.answers = [];
  state.fields = {};
  state.path = [];
  state.stepCount = 0;
  state.done = false;
  progress.style.width = '0%';
  currentStepId = START_STEP;
  saveState();
  setTimeout(() => renderStep(START_STEP), 350);
}

function renderTextInput(step) {
  optionsBox.classList.remove('show');
  inputbar.classList.add('show');
  textInput.value = (step.field === 'name' && state.name) ? state.name : '';
  textInput.focus();
  const submit = () => {
    const val = textInput.value.trim();
    if (val.length < 2) { toast('נא להזין תשובה'); return; }
    addBubble(val, 'user');
    if (step.field) state.fields[step.field] = val;
    state.answers.push({ stepId: currentStepId, answer: val });
    state.path.push(currentStepId);
    inputbar.classList.remove('show');
    const next = step.next;
    currentStepId = next;
    saveState();
    setTimeout(() => renderStep(next), 350);
  };
  sendBtn.onclick = submit;
  textInput.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
}

async function finishFlow(stepId) {
  state.path.push(stepId);
  state.done = true;
  progress.style.width = '100%';
  clearTimeout(partialTimer);
  saveState(); // keep the completed view on refresh (24h), no duplicate rows server-side
  await submitLead();
  setChatInput(); // any message after completion restarts the flow from the first question
}

/* ═══════════════ PHONE GATE (no ?p= in URL) ═══════════════ */
function askPhone() {
  addBubble('שלום! 👋 כדי להתחיל את בדיקת הזכאות, מה מספר הטלפון שלך?', 'bot');
  inputbar.classList.add('show');
  textInput.type = 'tel';
  textInput.placeholder = '050-0000000';
  textInput.focus();
  const submit = () => {
    const p = normalizePhone(textInput.value);
    if (!p) { toast('מספר לא תקין, נסה שוב'); return; }
    state.phone = p;
    addBubble(textInput.value.trim(), 'user');
    inputbar.classList.remove('show');
    logClick();
    saveState();
    textInput.type = 'text';
    textInput.placeholder = 'הקלד תשובה...';
    setTimeout(() => { currentStepId = START_STEP; renderStep(START_STEP); }, 350);
  };
  sendBtn.onclick = submit;
  textInput.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
}

/* ═══════════════ BOOT ═══════════════ */
let currentStepId = START_STEP;
window.addEventListener('DOMContentLoaded', async () => {
  if (state.shortToken) {
    try {
      await resolveShortToken();
    } catch (_) {
      await new Promise(resolve => setTimeout(resolve, 500));
      try {
        await resolveShortToken();
      } catch (_) {
        state.shortToken = '';
        clearState();
        addBubble('לא הצלחנו לפתוח את הקישור המקוצר. אפשר להקליד את מספר הטלפון ולהמשיך.', 'bot');
      }
    }
  }

  const saved = loadState();
  let resume = false;
  if (saved) {
    if (state.phone && saved.phone && state.phone !== saved.phone) {
      clearState(); // a different recipient opened a link on this device
    } else if (!saved.done || (saved.answers || []).length || saved.optedOut) {
      resume = true;
    }
  }

  if (state.optedOut || (resume && saved.optedOut)) {
    if (resume) restoreSession(saved);
    state.done = true;
    state.optedOut = true;
    progress.style.width = '100%';
    addBubble('המספר כבר הוסר מרשימת התפוצה ולא יישלחו אליו הודעות נוספות.', 'bot');
    return;
  }

  if (resume) {
    restoreSession(saved);
    logClick();
    if (state.done) {
      // already finished — show the completed chat as-is; a new message restarts
      const th = FLOW['end'];
      if (th) addBubble(th.messageText, 'bot');
      progress.style.width = '100%';
      setChatInput();
    } else {
      currentStepId = FLOW[saved.currentStepId] ? saved.currentStepId : START_STEP;
      renderStep(currentStepId); // re-ask the question where they stopped
    }
  } else if (state.phone) {
    logClick();
    renderStep(START_STEP);
  } else {
    askPhone();
  }
});
</script>
</body>
